name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

# Shared version resolution used in all three jobs:
# - Tag push (v1.2)  →  strips 'v'  →  "1.2"
# - Manual trigger   →  GITHUB_REF_NAME is a branch name like "main"
#                    →  falls back to "0.0-dev" (valid deb version)

jobs:
  # ════════════════════════════════════════════════════
  # JOB 1 — Build the PyInstaller binary
  # ════════════════════════════════════════════════════
  build:
    runs-on: ubuntu-22.04
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        run: |
          REF="${GITHUB_REF_NAME:-dev}"
          if [[ "$REF" =~ ^v?[0-9]+\.[0-9] ]]; then
            VERSION="${REF#v}"
          else
            VERSION="0.0-dev"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $VERSION"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            python3 python3-pip python3-venv python3-tk \
            tcl-dev tk-dev \
            libx11-dev libxext-dev \
            binutils

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install customtkinter tkinterdnd2 pyinstaller

      - name: Build binary with PyInstaller
        run: |
          pyinstaller \
            --name project-bundler \
            --onefile \
            --windowed \
            --clean \
            --collect-all customtkinter \
            --collect-all tkinterdnd2 \
            project_bundler_v3.py

      - name: Verify binary
        run: |
          ls -lh dist/project-bundler
          file dist/project-bundler

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary
          path: dist/project-bundler
          retention-days: 1

  # ════════════════════════════════════════════════════
  # JOB 2 — Build the .deb package
  # ════════════════════════════════════════════════════
  build-deb:
    runs-on: ubuntu-22.04
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        run: |
          REF="${GITHUB_REF_NAME:-dev}"
          if [[ "$REF" =~ ^v?[0-9]+\.[0-9] ]]; then
            VERSION="${REF#v}"
          else
            VERSION="0.0-dev"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $VERSION"

      - name: Download binary artifact
        uses: actions/download-artifact@v4
        with:
          name: binary
          path: dist/

      - name: Make binary executable
        run: chmod +x dist/project-bundler

      - name: Build .deb package
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          bash packaging/build_deb.sh "$VERSION"

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: deb-package
          path: "*.deb"
          retention-days: 1

  # ════════════════════════════════════════════════════
  # JOB 3 — Package and publish GitHub Release
  # ════════════════════════════════════════════════════
  release:
    runs-on: ubuntu-22.04
    needs: [build, build-deb]
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        run: |
          REF="${GITHUB_REF_NAME:-dev}"
          if [[ "$REF" =~ ^v?[0-9]+\.[0-9] ]]; then
            VERSION="${REF#v}"
          else
            VERSION="0.0-dev"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $VERSION"

      - name: Download binary
        uses: actions/download-artifact@v4
        with:
          name: binary
          path: dist/

      - name: Download .deb
        uses: actions/download-artifact@v4
        with:
          name: deb-package
          path: deb/

      - name: Make binary executable
        run: chmod +x dist/project-bundler

      - name: Create tar.gz release archive
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          cp install.sh dist/
          cp uninstall.sh dist/
          cd dist
          tar -czf "../project-bundler-v${VERSION}-linux-x86_64.tar.gz" \
            project-bundler install.sh uninstall.sh

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            project-bundler-*-linux-x86_64.tar.gz
            deb/*.deb
          generate_release_notes: true
          body: |
            ## Install Options

            ### Option 1 — .deb (Ubuntu / Debian / Mint) — recommended
            Download `project-bundler_${{ steps.version.outputs.version }}_amd64.deb` and either:
            - Double-click it to open in Software Center, or
            - `sudo dpkg -i project-bundler_${{ steps.version.outputs.version }}_amd64.deb`

            ### Option 2 — Universal tar.gz (all distros)
            ```bash
            tar -xzf project-bundler-v${{ steps.version.outputs.version }}-linux-x86_64.tar.gz
            bash install.sh
            ```

            ### Uninstall
            - .deb install: `sudo apt remove project-bundler`
            - tar.gz install: `bash uninstall.sh`
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
