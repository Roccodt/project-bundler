name: Build & Release

on:
  push:
    tags:
      - "v*"           # trigger on version tags like v1.0, v2.1.3
  workflow_dispatch:   # allow manual trigger from GitHub UI

jobs:
  build:
    # Build on the oldest supported Ubuntu for maximum glibc compatibility
    runs-on: ubuntu-20.04

    steps:
      # ── checkout ──────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── system deps ───────────────────────────────────────
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            python3 python3-pip python3-venv python3-tk \
            tcl-dev tk-dev \
            libx11-dev libxext-dev \
            binutils

      # ── python env ────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install customtkinter tkinterdnd2 pyinstaller

      # ── build ─────────────────────────────────────────────
      - name: Build with PyInstaller
        run: |
          pyinstaller \
            --name project-bundler \
            --onefile \
            --windowed \
            --clean \
            --collect-all customtkinter \
            --collect-all tkinterdnd2 \
            project_bundler_v3.py

      # ── sanity check ──────────────────────────────────────
      - name: Verify binary exists
        run: |
          ls -lh dist/project-bundler
          file dist/project-bundler

      # ── package release ───────────────────────────────────
      - name: Create release archive
        run: |
          TAG="${GITHUB_REF_NAME:-dev}"
          cp install.sh dist/
          cp uninstall.sh dist/
          cd dist
          tar -czf "../project-bundler-${TAG}-linux-x86_64.tar.gz" \
            project-bundler install.sh uninstall.sh
          cd ..

      # ── upload release assets ─────────────────────────────
      - name: Upload release binary
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            project-bundler-*-linux-x86_64.tar.gz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── also upload raw binary as artifact (for manual runs) ──
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: project-bundler-linux
          path: dist/project-bundler
          retention-days: 30
